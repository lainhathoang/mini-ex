openapi: 3.1.0
info:
    title: HTTP Server API
    version: 1.0.0
    description: |
        Authentication, user, and realtime endpoints for the HTTP server.

        Authentication uses username/password credentials. Passwords are hashed
        with Argon2; a successful sign-in returns a JWT bearer token that must be
        sent as `Authorization: Bearer <token>` on protected endpoints.

paths:
    /auth/sign-up:
        post:
            summary: Register a new account
            tags:
                - auth
            description: |
                Creates an account from a username/password pair. The username
                must be 3-32 characters and the password at least 8 characters.
                Both are trimmed before validation. Fails if the username is
                already taken.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Credentials"
            responses:
                "201":
                    description: Account created
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - id
                                    - username
                                properties:
                                    id:
                                        type: string
                                        description: Generated user id
                                    username:
                                        type: string
                "400":
                    description: Validation failed or username already taken
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /auth/sign-in:
        post:
            summary: Sign in with credentials
            tags:
                - auth
            description: |
                Verifies the username/password pair and returns a JWT bearer
                token on success.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Credentials"
            responses:
                "200":
                    description: Successfully authenticated, JWT token returned
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - token
                                properties:
                                    token:
                                        type: string
                                        description: JWT bearer token
                "400":
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "401":
                    description: Invalid credentials
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /auth/sign-out:
        post:
            summary: Sign out
            tags:
                - auth
            security:
                - BearerAuth: []
            description: |
                Requires a valid bearer token. Returns `204 No Content`.
            responses:
                "204":
                    description: Signed out
                "401":
                    description: Missing, invalid, or expired token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /users/me:
        get:
            summary: Get current user
            tags:
                - users
            security:
                - BearerAuth: []
            description: |
                Returns the authenticated user's profile.
            responses:
                "200":
                    description: User info returned
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - address
                                properties:
                                    address:
                                        type: string
                                        description: The authenticated user's identifier
                "401":
                    description: Missing, invalid, or expired token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /portfolio/{userId}:
        get:
            summary: Get a user's portfolio
            tags:
                - portfolio
            security:
                - BearerAuth: []
            description: |
                Returns the cash balance and asset balances for the user.
                The path `userId` must match the authenticated user; accessing
                another user's portfolio returns `403`.
            parameters:
                - name: userId
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Portfolio returned
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Portfolio"
                "400":
                    description: Invalid user id format
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "401":
                    description: Missing, invalid, or expired token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "403":
                    description: Cannot access another user's portfolio
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /orders:
        get:
            summary: List the authenticated user's orders
            tags:
                - orders
            security:
                - BearerAuth: []
            description: |
                Returns the authenticated user's orders, newest first.
            responses:
                "200":
                    description: Orders returned
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Order"
                "401":
                    description: Missing, invalid, or expired token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
        post:
            summary: Place a market order
            tags:
                - orders
            security:
                - BearerAuth: []
            description: |
                Places and synchronously executes a market order for the
                authenticated user (the user id is taken from the JWT, never the
                body). The latest price is fetched from the market-service.

                Idempotent: a required `client_order_id` makes retries safe. A
                request whose `(user, client_order_id)` already exists replays
                the original order with `200` instead of placing a new one.

                Validation failures (missing/oversized `client_order_id`, bad
                `side`, non-positive `quantity`, missing `symbol`) return `400`
                and create no order. Business rejections (insufficient
                cash/asset, market-service unavailable, invalid symbol) persist a
                `REJECTED` order and return it with `201`; inspect `status` and
                `rejectReason`.

                Decimal fields are sent and returned as strings to avoid any
                floating-point rounding.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CreateOrder"
            responses:
                "200":
                    description: >
                        Idempotent replay — an order with this client_order_id
                        already existed and is returned unchanged.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Order"
                "201":
                    description: Order created (status EXECUTED or REJECTED)
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Order"
                "400":
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "401":
                    description: Missing, invalid, or expired token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /orders/{orderId}:
        get:
            summary: Get an order by id
            tags:
                - orders
            security:
                - BearerAuth: []
            description: |
                Returns the order. Only the owning user may read it: unknown
                ids return `404`, and orders owned by another user return `403`.
            parameters:
                - name: orderId
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Order returned
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Order"
                "400":
                    description: Invalid order id format
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "401":
                    description: Missing, invalid, or expired token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "403":
                    description: Cannot access another user's order
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "404":
                    description: Order not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /funds/deposit:
        post:
            summary: Deposit USD (testing only)
            tags:
                - funds
            security:
                - BearerAuth: []
            description: |
                Testing/demo helper that credits USD to the authenticated
                user's cash balance. `amount` is a positive decimal string.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Deposit"
            responses:
                "200":
                    description: Updated cash balance returned
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - cash_balance
                                properties:
                                    cash_balance:
                                        type: string
                                        description: Updated USD cash balance
                "400":
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "401":
                    description: Missing, invalid, or expired token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /random-u64:
        get:
            summary: Stream random u64 values (WebSocket)
            tags:
                - ws
            description: |
                WebSocket endpoint. Upgrade the connection (`Upgrade: websocket`)
                and the server pushes a new random `u64` (as text) once per second.
                Standard ping/pong and close frames are honored.
            responses:
                "101":
                    description: Switching Protocols — WebSocket connection established

components:
    schemas:
        Credentials:
            type: object
            required:
                - username
                - password
            properties:
                username:
                    type: string
                    minLength: 3
                    maxLength: 32
                password:
                    type: string
                    minLength: 8
        AssetBalance:
            type: object
            required:
                - symbol
                - quantity
            properties:
                symbol:
                    type: string
                quantity:
                    type: string
                    description: Asset quantity as a decimal string
        Portfolio:
            type: object
            required:
                - user_id
                - username
                - cash_balance
                - assets
            properties:
                user_id:
                    type: string
                    format: uuid
                username:
                    type: string
                cash_balance:
                    type: string
                    description: USD cash balance as a decimal string
                assets:
                    type: array
                    items:
                        $ref: "#/components/schemas/AssetBalance"
        CreateOrder:
            type: object
            required:
                - symbol
                - side
                - quantity
                - client_order_id
            properties:
                symbol:
                    type: string
                    example: BTC
                side:
                    type: string
                    enum: [BUY, SELL]
                quantity:
                    type: string
                    description: Positive decimal string
                    example: "0.01"
                client_order_id:
                    type: string
                    maxLength: 100
                    description: >
                        Client-generated idempotency key (required). Retrying with
                        the same key replays the original order instead of placing
                        a new one.
                    example: 9f3a1c2e-7b40-4d11-8a2e-1c0f5b6d7e8a
        Order:
            type: object
            required:
                - id
                - user_id
                - client_order_id
                - symbol
                - side
                - quantity
                - status
            properties:
                id:
                    type: string
                    format: uuid
                user_id:
                    type: string
                    format: uuid
                client_order_id:
                    type: string
                    description: Client-supplied idempotency key for this order
                symbol:
                    type: string
                side:
                    type: string
                    enum: [BUY, SELL]
                quantity:
                    type: string
                price:
                    type: [string, "null"]
                    description: Executed price (decimal string); null until executed
                status:
                    type: string
                    enum: [CREATED, EXECUTED, REJECTED]
                reject_reason:
                    type: [string, "null"]
                    enum:
                        [
                            INSUFFICIENT_CASH,
                            INSUFFICIENT_ASSET,
                            MARKET_SERVICE_UNAVAILABLE,
                            INVALID_SYMBOL,
                            INVALID_QUANTITY,
                            null,
                        ]
                created_at:
                    type: string
                    format: date-time
        Deposit:
            type: object
            required:
                - amount
            properties:
                amount:
                    type: string
                    description: Positive decimal USD amount
                    example: "10000"
        Error:
            type: object
            required:
                - code
                - msg
            properties:
                code:
                    type: integer
                    description: HTTP status code
                msg:
                    type: string
                    description: Human-readable error message
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: JWT bearer token from /auth/sign-in
