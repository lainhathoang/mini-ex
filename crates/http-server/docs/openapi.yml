openapi: 3.1.0
info:
    title: HTTP Server API
    version: 1.0.0
    description: |
        Authentication, user, and realtime endpoints for the HTTP server.

        Authentication uses username/password credentials. Passwords are hashed
        with Argon2; a successful sign-in returns a JWT bearer token that must be
        sent as `Authorization: Bearer <token>` on protected endpoints.

paths:
    /auth/sign-up:
        post:
            summary: Register a new account
            tags:
                - auth
            description: |
                Creates an account from a username/password pair. The username
                must be 3-32 characters and the password at least 8 characters.
                Both are trimmed before validation. Fails if the username is
                already taken.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Credentials"
            responses:
                "201":
                    description: Account created
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - id
                                    - username
                                properties:
                                    id:
                                        type: string
                                        description: Generated user id
                                    username:
                                        type: string
                "400":
                    description: Validation failed or username already taken
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /auth/sign-in:
        post:
            summary: Sign in with credentials
            tags:
                - auth
            description: |
                Verifies the username/password pair and returns a JWT bearer
                token on success.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Credentials"
            responses:
                "200":
                    description: Successfully authenticated, JWT token returned
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - token
                                properties:
                                    token:
                                        type: string
                                        description: JWT bearer token
                "400":
                    description: Validation failed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "401":
                    description: Invalid credentials
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /auth/sign-out:
        post:
            summary: Sign out
            tags:
                - auth
            security:
                - BearerAuth: []
            description: |
                Requires a valid bearer token. Returns `204 No Content`.
            responses:
                "204":
                    description: Signed out
                "401":
                    description: Missing, invalid, or expired token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /users/me:
        get:
            summary: Get current user
            tags:
                - users
            security:
                - BearerAuth: []
            description: |
                Returns the authenticated user's profile.
            responses:
                "200":
                    description: User info returned
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - address
                                properties:
                                    address:
                                        type: string
                                        description: The authenticated user's identifier
                "401":
                    description: Missing, invalid, or expired token
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    /random-u64:
        get:
            summary: Stream random u64 values (WebSocket)
            tags:
                - ws
            description: |
                WebSocket endpoint. Upgrade the connection (`Upgrade: websocket`)
                and the server pushes a new random `u64` (as text) once per second.
                Standard ping/pong and close frames are honored.
            responses:
                "101":
                    description: Switching Protocols — WebSocket connection established

components:
    schemas:
        Credentials:
            type: object
            required:
                - username
                - password
            properties:
                username:
                    type: string
                    minLength: 3
                    maxLength: 32
                password:
                    type: string
                    minLength: 8
        Error:
            type: object
            required:
                - code
                - msg
            properties:
                code:
                    type: integer
                    description: HTTP status code
                msg:
                    type: string
                    description: Human-readable error message
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: JWT bearer token from /auth/sign-in
